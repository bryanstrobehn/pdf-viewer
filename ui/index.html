<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViewDaFile</title>
  <link rel="stylesheet" href="style.css">
  <!-- PDF.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

  <nav class="topbar">
    <div class="nav-left">
      <button id="openBtn">Open</button>
      <button id="closeBtn">Close</button>
    </div>
    <div class="nav-center">
      <span id="filename">no file open</span>
    </div>
    <div class="nav-right">
      <button id="printBtn" title="Print (Ctrl+P)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3.5" y="1"   width="7" height="4.5" rx="0.6" stroke="currentColor" stroke-width="1.2"/>
          <rect x="1"   y="4.5" width="12" height="6"  rx="1"   stroke="currentColor" stroke-width="1.2"/>
          <rect x="3.5" y="8.5" width="7" height="4.5" rx="0.6" stroke="currentColor" stroke-width="1.2"/>
          <circle cx="10.2" cy="7.5" r="0.9" fill="currentColor"/>
        </svg>
      </button>
      <div id="zoom-controls">
        <button id="zoomOutBtn">−</button>
        <span id="zoomLevel">100%</span>
        <button id="zoomInBtn">+</button>
        <button id="zoomFitBtn">Fit</button>
      </div>
      <span id="pageinfo"><input id="page-input" type="text" spellcheck="false"><span id="page-total"></span></span>
    </div>
  </nav>

  <main id="viewport">
    <!-- Empty state: drop hint + recently opened tiles -->
    <div id="empty-state">
      <div id="drop-hint">
        <p>Drop a PDF here</p>
        <p>or click <strong>Open</strong></p>
      </div>
      <div id="recent-section">
        <p class="recent-label">Recent</p>
        <div id="recent-tiles"></div>
      </div>
    </div>

    <!-- Continuous-scroll page container, shown when a PDF is loaded -->
    <div id="pages-container"></div>
  </main>

  <div id="find-bar">
    <input id="find-input" type="text" placeholder="Find in document…" spellcheck="false">
    <span id="find-count"></span>
    <button id="find-prev" title="Previous (Shift+Enter)">↑</button>
    <button id="find-next" title="Next (Enter)">↓</button>
    <button id="find-close">✕</button>
  </div>

  <div id="stickguy">
    <svg width="28" height="46" viewBox="0 0 28 46" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- head -->
      <circle cx="14" cy="7" r="5.5" stroke="#d4d4d4" stroke-width="1.5"/>
      <!-- deal-with-it glasses: two lenses + bridge -->
      <rect x="7"  y="4.5" width="5" height="3.5" rx="0.5" fill="#d4d4d4"/>
      <rect x="16" y="4.5" width="5" height="3.5" rx="0.5" fill="#d4d4d4"/>
      <line x1="12" y1="6.2" x2="16" y2="6.2" stroke="#d4d4d4" stroke-width="1.2"/>
      <!-- body -->
      <line x1="14" y1="12.5" x2="14" y2="28" stroke="#d4d4d4" stroke-width="1.5"/>
      <!-- arms — right arm wrapped for wave animation -->
      <line x1="14" y1="17" x2="5"  y2="23" stroke="#d4d4d4" stroke-width="1.5"/>
      <g class="egg-wave-arm">
        <line x1="14" y1="17" x2="23" y2="23" stroke="#d4d4d4" stroke-width="1.5"/>
      </g>
      <!-- legs -->
      <line x1="14" y1="28" x2="7"  y2="42" stroke="#d4d4d4" stroke-width="1.5"/>
      <line x1="14" y1="28" x2="21" y2="42" stroke="#d4d4d4" stroke-width="1.5"/>
    </svg>
  </div>
  <div id="egg-toast"></div>
  <script src="app.js"></script>
</body>
</html>
